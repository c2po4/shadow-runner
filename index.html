<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Shadow Runner - 2D Jump & Run</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
        }
        canvas {
            border: 2px solid #333;
            image-rendering: pixelated;
        }
        #info {
            position: absolute;
            bottom: 10px;
            color: #666;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="960" height="540"></canvas>
    <div id="info">Pfeiltasten/WASD: Bewegen | Leertaste/W/Up: Springen | R: Neustart</div>
    <script src="game.js?v=2"></script>
</body>
</html>
